<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feature Flag Panel</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        #feature-flag-panel-root {
            min-height: 400px;
            padding: 16px;
            box-sizing: border-box;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 200px;
            color: #666;
        }

        .error {
            padding: 20px;
            background-color: #fdf2f2;
            border: 1px solid #f5c6cb;
            border-radius: 4px;
            color: #721c24;
            margin: 20px;
        }
    </style>
</head>
<body>
    <div id="feature-flag-panel-root">
        <div class="loading">Loading Feature Flags...</div>
    </div>
</body>
</html>
